<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello, GitHub Actions!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 0.4rem 1.2rem;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.65);
      max-width: 480px;
      margin: 0 auto 2rem;
      line-height: 1.7;
    }

    .cards {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 1.2rem 1.6rem;
      width: 160px;
      backdrop-filter: blur(10px);
      transition: transform 0.2s, background 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.12);
    }

    .card .icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .card .label { font-size: 0.82rem; color: rgba(255,255,255,0.6); }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">🚀 Deployed via GitHub Actions</div>
    <h1>Hello, GitHub Actions!</h1>
    <p>This static site is automatically deployed to GitHub Pages whenever <code>index.html</code> is updated on the <strong>main</strong> branch.</p>

    <div class="cards">
      <div class="card">
        <div class="icon">⚙️</div>
        <div class="label">GitHub Actions</div>
      </div>
      <div class="card">
        <div class="icon">📄</div>
        <div class="label">GitHub Pages</div>
      </div>
      <div class="card">
        <div class="icon">🔄</div>
        <div class="label">CI / CD</div>
      </div>
    </div>

    <footer>Auto-deployed on every push · gh-deployment-workflow</footer>
  </div>
</body>
</html>
